<!DOCTYPE html>
<html>
     <head>
          <title>Event Registration</title>
     </head>

     <body>
          <header>
               <h1>Event Registration Form </h1>
          </header>

          <main>
               <form>
                    <p>
                         Full Name:<br>
                         <input type="text" name="full_name" placeholder="Enter your full name" required>
                    </p>

                    <p>
                         Email Adress:<br>
                         <input type="email" name="email" placeholder="Enter your email" required>
                    </p>

                    <p>
                         Password:<br>
                         <input type="password" name="password" placeholder="Enter your password" minlength="8" maxlength="16" required>
                    </p>

                    <p>
                         Gender:<br>
                         <input type="radio" name="gender" value="male" id="male"><label for="male" required>Male</label>
                         <input type="radio" name="gender" value="female" id="female"><label for="female">Female</label>
                         <input type="radio" name="gender" value="other" id="other"><label for="other">Others</label>
                         
                    </p>

                     <p>
                         Interests:<br>
                         <input type="checkbox" name="Interests" value="ai" id="ai"><label for="ai">AI</label>
                         <input type="checkbox" name="Interests" value="web_development" id="web"><label for="web">Web Development</label>
                         <input type="checkbox" name="Interests" value="data_science" id="data"><label for="data">Data Science</label>
                         
                    </p>

                    <p>
                         Experience Level:<br>
                         <select name="experience" required>
                              <option value="beginner">Beginner</option>
                              <option value="Intermediate">Intermediate</option>
                              <option value="Advanced">Advanced</option>

                         </select>

                    </p>

                    <p>
                         Favorite Session:<br>

                    <input type="text" list="favorite" name="favorite_session">

                    <datalist id="favorite">
                         <option value="AI for beginners">
                         <option value="Python made easy">
                         <option value="Cybersecurity">
                         
                    </datalist>

                    </p>

                    <p>
                         About Yourself:<br>
                         <textarea name="about" rows="5" cols="50" placeholder="Tell us about yourself" ></textarea>
                    </p>

                    <input type="submit" value="Register">




               </form>
          </main>
     </body>
</html>
